substitutions:
  name: "esphome-ams-display"
  friendly_name: "AMS-meter hvit"
  section1_end: "5"
  section2_end: "10"
  section3_end: "15"
  center_label: "7.5" # Setting this automatically is currently a work-in-progress!

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  # Set up a wifi access point
  ap: {}

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

sensor:
  - platform: homeassistant
    id: kwh_live
    entity_id: sensor.power_hjemme
    internal: True
    filters:
      - or:
          - delta: 100 # Send updates only when the change is more than 100 watts
          - timeout:
              timeout: 5min
              value: 0
      - multiply: 0.001 # Convert from Wh to kWh
    on_value:
      then:
        - script.execute: update_display
        - if: # Green font color if current usage is under 5 kWh
            condition:
              sensor.in_range:
                id: kwh_live
                below: ${section1_end}
            then:
              - lvgl.label.update:
                  id: power_meter_text
                  text_color: 0x00FF00
        - if: # Yellow font color if current usage is 5-10 kWh
            condition:
              sensor.in_range:
                id: kwh_live
                above: ${section1_end}
                below: ${section2_end}
            then:
              - lvgl.label.update:
                  id: power_meter_text
                  text_color: 0xFFFF00
        - if: # Red font color if current usage is over 10 kWh
            condition:
              sensor.in_range:
                id: kwh_live
                above: ${section2_end}
            then:
              - lvgl.label.update:
                  id: power_meter_text
                  text_color: 0xFF0000

  - platform: homeassistant
    id: kwh_today
    entity_id: sensor.accumulated_consumption_hjemme
    internal: True
    filters:
      - or:
          - delta: 0.5 # Send updates only when the change is more than 0.5 kWh
          - timeout:
              timeout: 90min
              value: 0

  - platform: homeassistant
    id: cost_today
    entity_id: sensor.strom_hittil_i_dag_kr
    internal: True
    filters:
      - or:
          - delta: 1 # Send updates only when the change is more than 1 kr
          - timeout:
              timeout: 150min
              value: 0

  - platform: homeassistant
    id: kwh_month
    entity_id: sensor.kwh_hittil_mnd
    internal: True
    filters:
      - or:
          - delta: 0.5 # Send updates only when the change is more than 0.5 kWh
          - timeout:
              timeout: 90min
              value: 0

  - platform: homeassistant
    id: cost_month
    entity_id: sensor.strom_hittil_mnd_kr
    internal: True
    filters:
      - or:
          - delta: 1 # Send updates only when the change is more than 1 kr
          - timeout:
              timeout: 150min
              value: 0

spi:
  clk_pin: GPIO6
  mosi_pin: GPIO7

output:
  - platform: ledc
    pin:
      number: GPIO3
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: LCD Backlight
    id: back_light
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        lvgl.pause

# CHANGED: Migrated from deprecated "ili9xxx" platform to "mipi_spi"
# The ili9xxx platform causes blank screens in ESPHome 2026.4.0 with LVGL v9.
display:
  - platform: mipi_spi
    model: GC9A01A
    invert_colors: true
    id: lcd_display
    data_rate: 80MHz
    cs_pin: GPIO10
    dc_pin: GPIO2
    dimensions:
      width: 240
      height: 240
    pixel_mode: 16bit    # explicit pixel mode required for mipi_spi
    color_order: BGR     # GC9A01A requires BGR for correct colors
    update_interval: never
    auto_clear_enabled: false
    # Orientation (upside-down mount) is handled by rotation: 180 in the lvgl: block

script:
  - id: update_display
    then:
      - lvgl.indicator.update:
          id: power_meter_input
          value: !lambda return id(kwh_live).get_state()*10;
      - lvgl.label.update:
          id: power_meter_text
          text:
            format: "%.1f kW"
            args: [ 'id(kwh_live).get_state()' ]
      - lvgl.image.update:
          id: img_thunderbolt
          src: thunderbolt_icon
          image_recolor: 0xFFF000 #mixes this color with the base image
      - lvgl.label.update:
          id: kwh_today_text
          text:
            format: "%.1f kWh"
            args: [ 'id(kwh_today).get_state()' ]
      - lvgl.label.update:
          id: cost_today_text
          text:
            format: "%.0f kr"
            args: [ 'id(cost_today).get_state()' ]
      - lvgl.label.update:
          id: kwh_month_text
          text:
            format: "%.1f kWh"
            args: [ 'id(kwh_month).get_state()' ]
      - lvgl.label.update:
          id: cost_month_text
          text:
            format: "%.0f kr"
            args: [ 'id(cost_month).get_state()' ]

i2c:
  sda: 4
  scl: 5
  id: i2c_touch

touchscreen:
  platform: cst816
  id: my_touchscreen
  interrupt_pin: 0
  reset_pin: 1
  on_touch:
    then:
      - if: # If the LCD is switched off (controllable from the HASS-device), turn on display on first touch
          condition: lvgl.is_paused
          then:
            - lvgl.resume
            - lvgl.page.show: main_page
            - light.turn_on:
                id: back_light
          else: # If LCD is on, then a touch should show the next page
            - lvgl.page.next

image:
  - file: mdi:lightning-bolt
    id: thunderbolt_icon
    resize: 50x50
    type: BINARY

lvgl:
  touchscreens: my_touchscreen
  rotation: 180          # replaces old "transform: mirror_y: true" on the display
  log_level: WARN
  color_depth: 16
  bg_color: 0
  border_width: 0
  outline_width: 0
  shadow_width: 0
  text_font: unscii_16
  align: center
  style_definitions:
    - id: meter_style
      text_font: unscii_8
    - id: font_style
      text_font: MONTSERRAT_24
      align: center
      text_color: 0xFFFFFF
      bg_opa: TRANSP
      bg_color: 0
      radius: 4
      pad_all: 2
  on_idle: # Go back to main page after 15 sec
    - timeout: 15 sec
      then:
        - lvgl.page.show: main_page
  page_wrap: true
  pages:
    - id: main_page
      widgets:
        - obj: # Meter
            height: 240 # needed to be explicitly defined for my round display to not have weird corner line overlapping gauge
            width: 240
            bg_color: 0
            border_width: 0
            outline_width: 0
            shadow_width: 0
            pad_all: 4
            align: center
            widgets:
              - meter: # Gradient color arc
                  height: 100%
                  width: 100%
                  border_width: 0
                  outline_width: 0
                  align: center
                  bg_color: 0
                  styles: meter_style
                  scales:
                    angle_range: 240 # sets the total angle to 180 = starts mid left and ends mid right
                    range_to: 150
                    range_from: 0
                    ticks:
                      count: 2
                    indicators:
                      - line:
                          id: power_meter_input
                          width: 10
                          color: 0x0000FF
                          r_mod: 12
                          value: 0
                      - arc:
                          color: 0x00FF00
                          r_mod: 10
                          width: 20
                          start_value: 0
                          end_value: !lambda return $section1_end*10;
                      - arc:
                          color: 0xFFFF00
                          r_mod: 10
                          width: 20
                          start_value: !lambda return $section1_end*10;
                          end_value: !lambda return $section2_end*10;
                      - arc:
                          color: 0xFF3000
                          r_mod: 10
                          width: 20
                          start_value: !lambda return $section2_end*10;
                          end_value: !lambda return $section3_end*10;
              - obj: # to erase middle part of meter indicator line
                  height: 180
                  width: 180
                  radius: 90
                  align: center
                  border_width: 0
                  pad_all: 0
                  bg_color: 0x000000
              - label: # gauge lower range indicator
                  styles: font_style
                  text_font: MONTSERRAT_22
                  y: 70
                  x: -70
                  text: "0"
              - label: # gauge center indicator
                  styles: font_style
                  text_font: MONTSERRAT_22
                  y: -70
                  x: 0
                  text: $center_label
              - label: # gauge upper range indicator
                  styles: font_style
                  text_font: MONTSERRAT_22
                  y: 70
                  x: 70
                  text: $section3_end
              - label:
                  styles: font_style
                  text_font: MONTSERRAT_40
                  id: power_meter_text
                  y: 0
                  text: "? kW"
              - image:
                  src: thunderbolt_icon
                  id: img_thunderbolt
                  align: center
                  image_recolor: 0xFFFF00
                  image_recolor_opa: 100%
                  y: 80

    - id: page1
      height: 240
      width: 240
      bg_color: 0
      border_width: 0
      outline_width: 0
      shadow_width: 0
      pad_all: 4
      align: center
      widgets:
        - label:
            styles: font_style
            text_font: MONTSERRAT_30
            y: -40
            x: 0
            text: "Hittil i dag:"
        - label:
            styles: font_style
            text_font: MONTSERRAT_26
            id: kwh_today_text
            y: 0
            x: 0
            text: "? kWh"
        - label:
            styles: font_style
            text_font: MONTSERRAT_26
            id: cost_today_text
            y: 40
            x: 0
            text: "? kr"

    - id: page2
      height: 240
      width: 240
      bg_color: 0
      border_width: 0
      outline_width: 0
      shadow_width: 0
      pad_all: 4
      align: center
      widgets:
        - label:
            styles: font_style
            text_font: MONTSERRAT_30
            y: -40
            x: 0
            text: "Hittil mnd:"
        - label:
            styles: font_style
            text_font: MONTSERRAT_26
            id: kwh_month_text
            y: 0
            x: 0
            text: "? kWh"
        - label:
            styles: font_style
            text_font: MONTSERRAT_26
            id: cost_month_text
            y: 40
            x: 0
            text: "? kr"
